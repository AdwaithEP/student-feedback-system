<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            padding: 40px;
            width: 360px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        .login-box h2 {
            text-align: center;
            color: #00d4ff;
            font-size: 1.6rem;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .subtitle {
            text-align: center;
            color: #555;
            font-size: 0.8rem;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .error {
            background: rgba(231,76,60,0.15);
            border: 1px solid #e74c3c;
            color: #e74c3c;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 0.82rem;
            margin-bottom: 16px;
            text-align: center;
        }

        input {
            width: 100%;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            color: #eee;
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.9rem;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #00d4ff;
        }

        input::placeholder { color: #444; }

        button {
            width: 100%;
            background: linear-gradient(90deg, #0f3460, #533483);
            border: none;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.2s;
            margin-top: 6px;
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(0,212,255,0.2);
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>⚡ Admin Login</h2>
        <div class="subtitle">STUDENT FEEDBACK SYSTEM</div>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <input type="text" name="username" placeholder="Username" required autocomplete="off"/>
            <input type="password" name="password" placeholder="Password" required/>
            <button type="submit">LOGIN</button>
        </form>
    </div>
</body>
</html>
